# Cloudflare Workers 配置文件
# 部署命令: npx wrangler deploy

name = "product-key-generator"
main = "api/generate.js"
compatibility_date = "2024-01-01"

[build]
command = "echo 'No build required'"

[build.upload]
format = "service-worker"

[vars]
# 环境变量
API_VERSION = "1.0.0"

[[routes]]
pattern = "product-key-generator.your-domain.workers.dev/*"
zone_name = "your-domain.com"

# 部署配置
[env.production]
workers_dev = true

[env.staging]
workers_dev = true

# 日志配置
[logpush]
enabled = true

# 限制配置
[limits]
cpu_ms = 10

# 触发器配置
[triggers]
crons = []